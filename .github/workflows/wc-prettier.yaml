---
name: prettier
on: workflow_call
jobs:
  prettier:
    timeout-minutes: 15
    runs-on: ubuntu-latest
    permissions: {}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - run: npm i -g prettier
      - run: prettier -c .
